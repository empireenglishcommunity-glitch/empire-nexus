version: '3.8'

# ═══════════════════════════════════════════════════════════════
# n8n-MCP Server — Enables AI Agents to Build Workflows
# Deploy alongside existing n8n on Hetzner
# ═══════════════════════════════════════════════════════════════
# 
# USAGE:
#   scp this folder to server: scp -r n8n-mcp/ root@77.42.43.250:/opt/n8n-mcp/
#   SSH in: ssh root@77.42.43.250
#   Start: cd /opt/n8n-mcp && docker compose up -d
#   Check: docker compose logs --tail=20
#
# After running, any AI agent with MCP support can build workflows
# in your n8n instance at bot.empireenglish.online
# ═══════════════════════════════════════════════════════════════

services:
  n8n-mcp:
    image: ghcr.io/czlonkowski/n8n-mcp:latest
    container_name: empire-n8n-mcp
    restart: unless-stopped
    env_file: .env
    environment:
      # Your n8n instance connection (set values in .env file)
      N8N_API_URL: "${N8N_API_URL}"
      N8N_API_KEY: "${N8N_API_KEY}"

      # MCP server mode (HTTP streamable for remote access)
      MCP_TRANSPORT: "http"
      MCP_HTTP_PORT: "3001"
      MCP_HTTP_HOST: "0.0.0.0"

      # Performance
      NODE_ENV: "production"
      LOG_LEVEL: "info"

    ports:
      # Bind to localhost only — access via Cloudflare Tunnel if needed externally
      - "127.0.0.1:3001:3001"

    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
