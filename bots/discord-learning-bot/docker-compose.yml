name: empire-english-bot

services:
  empire-english-bot:
    build: .
    container_name: empire-english-bot
    restart: unless-stopped
    env_file: .env
    ports:
      - "8099:8099"
    volumes:
      - bot-data:/app/data_persist
      # Mounted separately from bot-data so `docker exec ... backup.py`
      # writes backups somewhere that survives a full container rebuild
      # (not just a restart), same as the database volume above.
      - bot-backups:/app/backups
    mem_limit: 512m
    cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot-data:
  bot-backups:
